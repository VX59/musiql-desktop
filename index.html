<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Musiql Player</title>
    <style>
        body {
            font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            padding-bottom: 80px;
        }
        .results-table {
            width: 100%;
            border-collapse: collapse;
        }

        .tablulated-result td {
            padding: 6px 8px;
            vertical-align: middle;
        }

        .result-artist {
            text-align: left;
            width: 30%;
        }

        .result-title {
            text-align: left;
            width: 50%;
        }

        .button-col {
            text-align: right;
            white-space: nowrap;
        }

        .button-col button {
            width: 70px;
            margin-left: 6px;
        }

        .tablulated-result {
            cursor: pointer;
        }

        .tablulated-result:hover {
            background: rgba(230, 230, 230, 1);
        }
        .results-table {
            width: 100%;
            border-collapse: collapse;
        }

        .results-table thead th {
            position: sticky;
            top: 0;
            background: rgba(230, 230, 230, 1);
            z-index: 2;
            text-align: left;
            padding: 8px;
        }
        .results-scroll {
            max-height: 800px;
            overflow-y: auto;
        }

        .search-bar {
            display: flex;
            gap: 2px;
            width: 100%;
            margin-bottom: 12px;
        }
        .search-bar input {
            flex: 1;
            padding: 10px;
            font-size: 14px;
            border: 1px solid #ddd;
            border-radius: 2px;
            outline: none;
            transition: all 0.2s ease;
        }
        .search-bar input:focus {
            border-color: #666;
            box-shadow: 0 0 0 3px rgba(0,0,0,0.08);
        }
        .search-bar button {
            padding: 10px;
            font-size: 14px;
            border: none;
            border-radius: 2px;
            cursor: pointer;
            background: #111;
            color: white;
            transition: background 0.2s ease;
        }
        .search-bar button:hover {
            background: #333;
        }

        .audio-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;

            display: grid;
            grid-template-columns: minmax(180px, 250px) minmax(200px, 1fr) auto; /* Flexible left column */

            align-items: center;
            gap: 16px; /* Slightly more gap for breathing room */

            padding: 10px 20px; /* More horizontal padding */
            background: #fff;
            border-top: 1px solid #ddd;
            z-index: 1000;
            box-sizing: border-box;
        }

        #audio-container button {
            padding: 8px 14px;
            border: none;
            border-radius: 2px;
            cursor: pointer;
            background: #111;
            color: white;
        }

        .left {
            display: flex;
            align-items: center;
            overflow: visible; /* Changed from hidden */
            min-width: 0;
        }

        .now-playing {
            display: flex;
            flex-direction: column;
            overflow: visible; /* Changed from hidden */
            min-width: 0;
            width: 100%;
        }

        #title {
            font-size: 14px;
            font-weight: 600;
            color: #111;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%; /* Ensure it respects container */
        }

        #artist {
            font-size: 12px;
            color: #666;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }

        .center {
            display: flex;
            justify-content: center;
            min-width: 0;
            width: 100%;
        }

        .center audio {
            width: 90%;
            min-width: 0; /* Remove minimum width restriction */
            max-width: 90%; /* Allow full width */
            display: block;
        }

        .right {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        /* Style for the Next button */
        .right button {
            margin: 0;
            padding: 8px 14px;
            border: none;
            border-radius: 2px; /* Consistent with other buttons */
            cursor: pointer;
            background: #111;
            color: white;
            font-size: 14px;
            white-space: nowrap;
        }

        /* Alternative layout if you want the player to take full center space */
        /* Uncomment this if you want the player to expand fully */
        /*
        .center audio {
            min-width: 300px;
            max-width: 100%;
        }
        */

        /* Responsive design for smaller screens */
        @media (max-width: 700px) {
            .audio-container {
                grid-template-columns: minmax(150px, 200px) minmax(180px, 1fr) auto;
                gap: 10px;
                padding: 10px 12px;
            }
            
            #title, #artist {
                font-size: 12px; /* Slightly smaller on mobile */
            }
            
            .right button {
                padding: 6px 10px;
                font-size: 12px;
            }
        }

        @media (max-width: 550px) {
            .audio-container {
                grid-template-columns: 1fr auto; /* Stack on very small screens */
                grid-template-rows: auto auto;
                gap: 8px;
            }
            
            .left {
                grid-column: 1 / -1;
                order: 2;
            }
            
            .center {
                grid-column: 1;
                order: 1;
            }
            
            .right {
                grid-column: 2;
                order: 1;
            }
        }
        .nav-buttons button {
            margin-bottom: 12px;
            padding: 8px 14px;
            border: none;
            border-radius: 2px;
            cursor: pointer;
            background: #111;
            color: white;
            font-size: 14px;
        }
        .nav-buttons button:hover {
            background: #333;
        }

        .add-music-container {
            display: none;
        }

        .upload-bar {
            display: flex;
            width: 100%;
            margin-bottom: 12px;
        }
        .upload-bar input {
            flex: 1;
            padding: 10px;
            font-size: 15px;

            border: 1px solid #ddd;
            border-radius: 2px;

            outline: none;
            transition: all 0.2s ease;
        }
        .upload-bar input:focus {
            border-color: #666;
            box-shadow: 0 0 0 3px rgba(0,0,0,0.08);
        }
        .upload-bar button {
            padding: 10px;
            font-size: 14px;

            border: none;
            border-radius: 2px;

            background: #16a34a;
            color: white;

            cursor: pointer;
            transition: background 0.2s ease;
        }
        .upload-bar button:hover {
            background: #12833b;
        }

        .fix-card-content {
            display: flex;
            flex-direction: column;
            gap: 2px;

            padding: 12px;
            margin-bottom: 10px;

            border: 1px solid #ddd;
            border-radius: 2px;
            background: #fff;
        }
        .fix-title {
            font-size: 14px;
            font-weight: 600;
            color: #111;
        }
        .fix-card-content input {
            padding: 10px;
            font-size: 14px;

            border: 1px solid #ddd;
            border-radius: 2px;

            outline: none;
        }
        .fix-card-content button {
            padding: 10px;

            border: none;
            border-radius: 2px;

            background: #111;
            color: white;

            cursor: pointer;
        }
        .fix-card-content button:hover {
            background: #333;
        }

    </style>
</head>

<body class="d-flex align-items-center justify-content-center vh-100">
<div id="loggedOutUi" class="container" style="max-width: 700px; display:block">
    <div id="loginModal" class="modal hidden">
        <div class="modal-content">

            <h2>Login</h2>

            <input id="username" placeholder="Username" />
            <input id="password" type="password" placeholder="Password" />

            <div class="actions">
                <button onclick="submitLogin()">Login</button>
            </div>

        </div>
    </div>
</div>
<div id="loggedInUi" class="container" style="max-width: 700px; display:none">
    <div class="card shadow-lg p-4">

        <h1 class="text-center mb-4"> Musiql Player</h1>

        <!-- Advanced Search -->
        <div class="search-bar">
            <input type="text" id="advanced-term" placeholder="Search titles and artists">
            <button onclick="advanced_search()">Search</button>
        </div>
 
        <div class="audio-container">

            <!-- LEFT: now playing -->
            <div class="left">
                <div class="now-playing">
                    <div id="title"></div>
                    <div id="artist"></div>
                </div>
            </div>

            <!-- CENTER: player -->
            <div class="center">
                <audio id="player" controls></audio>
            </div>
            <div class="right">
                <button id="sample">Next</button>
            </div>

        </div>
    </div>

    <div class="nav-buttons">
        <button class="library" onclick="library()">library</button>
        <button class="queue" onclick="toggleQueue()">queue</button>
        <button class="add-music" onclick="toggleAddMusic()">add music</button>
    </div>
    <!-- Upload Section -->
    <div class="add-music-container" id="addMusicModal">
        <div class="upload-bar">
            <input type="text" id="uploader" placeholder="Paste YouTube link here">
            <button onclick="upload_resource()">Add Resource</button>
        </div>

        <div id="fix-container"></div>
    </div>
    <div class="modal fade" id="queueModal" tabindex="-1">
        <div id="result-scroll">
            <table class="results-table">
                <tbody id="queueContainer"></tbody>
            </table>
        </div>
    </div>
    <!-- Search Modal -->
    <div class="modal fade" id="searchModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content p-3">
                <div class="modal-header border-0">
                    <h5 id="resultCount" class="modal-title"></h5>
                </div>
                <div class="results-scroll">
                    <table class="results-table">
                        <thead>
                            <tr>
                                <th>Artist</th>
                                <th>Title</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="resultsContainer"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>


<script>

    function getToken() {
        return localStorage.getItem("token");
    }

    window.addEventListener("DOMContentLoaded", () => {
        token = localStorage.getItem("token");

        if (token) {
            showLoggedInUi();
        } else {
            showLoggedOutUi();
        }
    });

    function showLoggedInUi() {
        document.getElementById("loggedInUi").style.display = "block";
        document.getElementById("loggedOutUi").style.display = "none";
    }

    function showLoggedOutUi() {
        document.getElementById("loggedInUi").style.display = "none";
        document.getElementById("loggedOutUi").style.display = "block";
    }


    async function submitLogin() {
        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;

        if (!username || !password) {
            alert("Please fill in both fields");
            return;
        }

        try {
            const res = await fetch("/musiql/login/user", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    username,
                    password
                })
            });

            if (!res.ok) {
                alert("Login failed");
                return;
            }

            const data = await res.json();

            // store token
            localStorage.setItem("token", data.token);

            // switch UI
            showLoggedInUi();

        } catch (err) {
            console.error(err);
            alert("Something went wrong");
        }
    }


    const MUSIQL_API_URL = "{{MUSIQL_API_URL}}";
    const MEDIA_INGESTION_API_URL = "{{MEDIA_INGESTION_API_URL}}";

    let current_hist_id = 0

    const player = document.getElementById("player");
    const sampleButton = document.getElementById("sample");

    const titleBar = document.getElementById("title");
    const artistBar = document.getElementById("artist")
    
    let oldSrc = null;
    let last_uri = null;

    async function showSearchResults(data) {
        const modal = document.getElementById("searchModal");
        const container = document.getElementById("resultsContainer");
        const count = document.getElementById("resultCount");

        container.innerHTML = "";
        count.textContent = `${data.num_results} Results`;
        
        if (data.num_results == 1) {
            library();
            record = data.results[0]
            await serve_music(record);
        } else {
            data.results.forEach(record => {
                const row = document.createElement("tr");
                row.className = "tablulated-result";
                row.style.cursor = "pointer";

                row.innerHTML = `
                <td class="result-artist">${record.artists}</td>
                <td class="result-title">${record.title}</td>
                <td class="button-col">
                    <button class="queue-btn">queue</button>
                </td>
                `;

                const queue_btn = row.querySelector('.queue-btn');
                queue_btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    stack(record)
                });

                row.onclick = async () => {
                    last_uri = record.uri;
                    await serve_music(record);
                }

                container.appendChild(row);
            });
        }
    }

    async function library() {
        const search = document.getElementById('advanced-term');
        search.value = null;
        await advanced_search();
    }

    async function advanced_search() {
        const term = document.getElementById('advanced-term').value;
        const player = document.getElementById('player');

        let progress = 1.0;
        if (current_hist_id > 0) {
            progress = player.currentTime/player.duration
        }

        const response = await fetch(`${MUSIQL_API_URL}/musiql/search/advanced`, {
            method: "POST",
            headers: {"Content-Type": "application/json", "Authorization": getToken()},
            body: JSON.stringify({search_term: term, history_id: current_hist_id, duration_played: progress})
        });
        
        if (!response.ok) {
            console.log("Error: " + response.status);
            return;
        }
        
        term.value = null;

        const jsonBody = await response.json();
        showSearchResults(jsonBody);
    }

    document.addEventListener("DOMContentLoaded", function() {
        library();
    });

    async function upload_resource() {
        const url = document.getElementById("uploader").value;

        const response = await fetch(`${MEDIA_INGESTION_API_URL}/media_ingestion/try/receive`, {
            method: "POST",
            headers: {"Content-Type" : "application/json", "Authorization": getToken()},
            body: JSON.stringify({url: url})
        });

        if (!response.ok) {
            console.log("Error: " + response.body);
            return;
        }


        response_json = await response.json();
        
        console.log(response_json);
        
        if (response_json.needs_fix) {
            const container = document.getElementById("fix-container")
            container.innerHTML = "";

            response_json.unknown_uploaders.forEach((entry, index) => {
                const div = document.createElement("div");

                div.id = `fix-card-${index}`;

                div.innerHTML = `
                    <div class="fix-card-content">
                        <div class="fix-title">${entry.title}</div>

                        <input 
                            type="text"
                            id="fix-${index}"
                            value="${entry.correction}"
                            placeholder="Correct artist name"
                        />

                        <button data-index="${index}"
                            onclick="submitFix(this, '${encodeURIComponent(JSON.stringify(entry))}')">
                            Commit
                        </button>
                    </div>
                `;

                container.appendChild(div);
            });
        }

        document.getElementById("uploader").value = null;
    }


    async function submitFix(button, encodedContext) {
        const context = JSON.parse(decodeURIComponent(encodedContext));
        const index = button.getAttribute("data-index");
        const input = document.getElementById(`fix-${index}`);
        context.correction = input.value;

        const response = await fetch(`${MEDIA_INGESTION_API_URL}/media_ingestion/fix_uploader`, {
            method: "POST",
            headers: {"Content-Type": "application/json", "Authorization": getToken()},
            body: JSON.stringify({
                context: context,
            })
        });

        if (!response.ok) {
            console.log("Error: ", response.status);
            return;
        }

        const fix_card = document.getElementById(`fix-card-${index}`);
        fix_card.innerHTML = null;
    }


    function playBlob(newBlob) {
        if (oldSrc) URL.revokeObjectURL(oldSrc);
        oldSrc = URL.createObjectURL(newBlob);
        player.src = oldSrc;
        player.play();
    }

    const queueListeners = new Set();
    let isQueueModalOpen = false;
    
    function onQueueChange(fn) {
        queueListeners.add(fn);
        return () => queueListeners.delete(fn);
    }

    function emitQueueChange() {
        queueListeners.forEach(fn => fn(queue));
    }

    function enqueue(item) {
        queue.push(item);
        emitQueueChange();
    }

    function stack(item) {
        queue.unshift(item);
        emitQueueChange();
    }

    function queue_remove(item) {
        queue = queue.filter(x => x.uri !== item.uri);
        emitQueueChange();
    }

    function dequeue() {
        const item = queue.shift();
        emitQueueChange();
        return item;
    }

    let queue_backlog = [];
    let queue = [];
    
    const queue_size = 10

    function renderQueue(queueData) {
        if (!isQueueModalOpen) return;

        const container = document.getElementById("queueContainer");
        container.innerHTML = "";
            
        queueData.forEach(record => {
            const row = document.createElement("tr");
            row.className = "tablulated-result";
            row.style.cursor = "pointer";

            row.innerHTML = `
            <td class="result-artist">${record.artists}</td>
            <td class="result-title">${record.title}</td>
            <td class="button-col">
                <button class="queue-remove-btn">remove</button>
            </td>
            `;

            const queue_btn = row.querySelector('.queue-remove-btn');
            queue_btn.addEventListener('click', (e) => {
                e.stopPropagation();
                queue_remove(record);
            });

            row.onclick = async () => {
                await serve_music(record);
            };

            container.appendChild(row);
        });
    }

    onQueueChange(() => {
        if (isQueueModalOpen) {
            renderQueue(queue);
        }
    });

    function toggleQueue() {
        const modal = document.getElementById('queueModal');

        isQueueModalOpen = !isQueueModalOpen;

        if (isQueueModalOpen) {
            renderQueue(queue);
            modal.style.display = "block";
        } else {
            modal.style.display = "none";
        }
    }

    let isAddMusicModalOpen = false;

    function toggleAddMusic() {
        const modal = document.getElementById("addMusicModal");

        isAddMusicModalOpen = !isAddMusicModalOpen;

        if (isAddMusicModalOpen) {
            modal.style.display = "block";
        } else {
            modal.style.display = "none";
        }
    }

    async function try_repopulate_queue(uri) {
        if (queue_backlog.length === 0) {
            const response = await fetch(`${MUSIQL_API_URL}/musiql/sample/${encodeURIComponent(uri)}`, {
                method: "GET",
                headers: {"Authorization": getToken()}
            });
            queue_backlog = await response.json();
        }

        while (queue.length < queue_size && queue_backlog.length > 0) {
            enqueue(queue_backlog.shift());
        }
    }

    async function serve_music(record) {
        let progress = 1.0;
        if (current_hist_id > 0) {
            progress = player.currentTime/player.duration;
        }

        const engagemet_response = await fetch(`${MUSIQL_API_URL}/musiql/log/engagement/`, {
            method : "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": getToken()
            },
            body : JSON.stringify({history_id : current_hist_id, duration_played: progress})
        })

        if (!engagemet_response.ok) {
            console.log("Error: ", engagemet_response.status);
            return;
        }

        const media_response = await fetch(`${MUSIQL_API_URL}/musiql/serve/${encodeURIComponent(record.uri)}`, {
            method: "GET",
            headers: {
                "Authorization": getToken()
            }
        });
        
        if (!media_response.ok) {
            console.log("Error: " + response.status);
            return;
        }

        titleBar.textContent = record.title;
        artistBar.textContent = record.artists;

        current_hist_id = media_response.headers.get("X-history-id");

        if (media_response.headers.get("Content-Type") == "application/json") {
            const { url } = await media_response.json();
            const blob = await fetch(url).then(r => r.blob());
            playBlob(blob);
        } else {
            console.log("unsupported response format")   
        }
    }

    async function playeNextFromQueue() {
        await try_repopulate_queue(last_uri);

        const record = dequeue();
        last_uri = record.uri;

        await serve_music(record);
    }

    player.addEventListener('ended', async () => {
        await playeNextFromQueue();
    });

    sampleButton.addEventListener('click', async () => {
        await playeNextFromQueue();
    });  


</script>
</body>
</html>
