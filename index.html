<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Musiql Player</title>
</head>

<body class="d-flex align-items-center justify-content-center vh-100">

<div class="container" style="max-width: 700px;">
    <div class="card shadow-lg p-4">

        <h1 class="text-center mb-4"> Musiql Player</h1>

        <!-- Advanced Search -->
        <div class="input-group mb-4">
            <input type="text" id="advanced-term" class="form-control" placeholder="Search titles and artists">
            <button class="btn btn-outline-light" onclick="advanced_search()">
                Search
            </button>
        </div>

        <!-- Now Playing -->
        <div class="text-center mb-3">
            <h4 id="title" class="fw-bold"></h4>
            <h6 id="artist" class="text-secondary"></h6>
            <img id="thumb"/>
        </div>

        <!-- Audio Player -->
        <div class="audio-container text-center mb-4">
            <audio id="player" controls class="w-100 mb-2"></audio>
            <button id="sample" class="btn" onclick="sample()">sample</button>
        </div>

        <!-- Upload Section -->
        <div class="input-group">
            <input type="text" id="uploader" class="form-control" placeholder="Paste YouTube link here">
            <button class="btn btn-success" onclick="upload_resource()">
                Add Resource
            </button>
        </div>
    </div>
</div>
<di>
    <button class="library" onclick="library()">library</button>
</di>
<!-- Search Modal -->
<div class="modal fade" id="searchModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content p-3">
            <div class="modal-header border-0">
                <h5 id="resultCount" class="modal-title"></h5>
            </div>
            <div id="resultsContainer" class="modal-body"></div>
        </div>
    </div>
</div>

<script>

    import jsmediatags from "jsmediatags";

    const API_URL = "{{API_URL}}";

    let current_hist_id = 0

    const player = document.getElementById("player");
    const sampleButton = document.getElementById("sample");

    const titleBar = document.getElementById("title");
    const artistBar = document.getElementById("artist")
    
    let oldSrc = null;

    async function showSearchResults(data) {
        const modal = document.getElementById("searchModal");
        const container = document.getElementById("resultsContainer");
        const count = document.getElementById("resultCount");

        container.innerHTML = "";
        count.textContent = `${data.num_results} Results`;
        
        if (data.num_results == 1) {
            
            record = data.results[0]

            await serve_music(record);
            player.onended = async () => {
                sample();
            }
        } else {
            data.results.forEach(record => {
                const row = document.createElement("div");
                row.className = "result-row";
                row.style.cursor = "pointer";

                row.innerHTML = `
                <div class="advanced-search-result">
                    <span class="result-title">${record.title}</span>
                    <span> • <span>
                    <span><class="result-artist">${record.artists}<span>
                </div>
                <div 
                `;
                
                row.onclick = async () => {
                    await serve_music(record);
                    player.onended = async () => {
                        sample();
                    }
                }

                container.appendChild(row);
            });
            
            const modalInstance = new bootstrap.Modal(document.getElementById('searchModal'));
            modalInstance.show();
        }
    }

    async function library() {
        const search = document.getElementById('advanced-term');
        search.value = null;
        await advanced_search();
    }

    async function advanced_search() {
        const term = document.getElementById('advanced-term').value;
        const player = document.getElementById('player');

        let progress = 1.0;
        if (current_hist_id > 0) {
            progress = player.currentTime/player.duration
        }

        const response = await fetch(`${API_URL}/musiql/search/advanced`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({search_term: term, history_id: current_hist_id, duration_played: progress})
        });
        
        if (!response.ok) {
            console.log("Error: " + response.status);
            return;
        }
        
        term.value = null;

        const jsonBody = await response.json();
        showSearchResults(jsonBody);
    }

    async function upload_resource() {
        const url = document.getElementById("uploader").value;

        const response = await fetch(`${API_URL}/musiql/`, {
            method: "POST",
            headers: {"Content-Type" : "application/json"},
            body: JSON.stringify({url: url})
        });

        if (!response.ok) {
            console.log("Error: " + response.body);
            return;
        } else {
            document.getElementById("uploader").value = null;
            console.log(`successully uploaded resource ${url}`);
        }
    }


    async function dispThumb(blob, target_element) {
        jsmediatags.read(blob, {
            onSuccess: function(tag) {
            const picture = tag.tags.picture;

            if (picture) {
                const { data, format } = picture;

                let base64String = "";
                for (let i = 0; i < data.length; i++) {
                base64String += String.fromCharCode(data[i]);
                }

                const base64 = btoa(base64String);
                const imageUrl = `data:${format};base64,${base64}`;

                target_element.src = imageUrl;
            }
            },
            onError: function(error) {
                console.log("Tag error:", error);
            }
        });
    }

    function playBlob(newBlob) {
        if (oldSrc) URL.revokeObjectURL(oldSrc);
        oldSrc = URL.createObjectURL(newBlob);
        player.src = oldSrc;
        player.play();
    }

    async function serve_music(record) {
        let progress = 1.0;
        if (current_hist_id > 0) {
            progress = player.currentTime/player.duration;
        }

        const sample_response = await fetch(`${API_URL}/musiql/log/engagement/`, {
            method : "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body : JSON.stringify({history_id : current_hist_id, duration_played: progress})
        })

        if (!sample_response.ok) {
            console.log("Error: ", sample_response.status);
            return;
        }
        
        const media_response = await fetch(`${API_URL}/musiql/serve/${encodeURIComponent(record.uri)}`, {
            method: "GET",
        });
        
        if (!media_response.ok) {
            console.log("Error: " + response.status);
            return;
        }

        titleBar.textContent = record.title;
        artistBar.textContent = record.artists;

        current_hist_id = media_response.headers.get("X-history-id");

        const blob = await media_response.blob();
        
        dispThumb(blob, document.getElementById("thumb"))
        playBlob(blob);
    }

    async function sample() {
        const player = document.getElementById('player');

        try {
            const response = await fetch(`${API_URL}/musiql/sample/`, {
                method: "GET",  
            })

            if (!response.ok) {
                console.log("Error: " + response.status);
                return;
            }
            
            const record = await response.json();
            await serve_music(record);

        } catch (err) {
            console.error(err);
        }

        player.onended = async () => {
            sample();
        }
    }

</script>
</body>
</html>
